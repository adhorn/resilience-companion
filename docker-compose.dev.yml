services:
  orr-companion:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - orr-data:/app/data
      # Prevent host node_modules from overriding container's (platform mismatch)
      - /app/node_modules
      - /app/packages/web/node_modules
      - /app/packages/api/node_modules
      - /app/packages/shared/node_modules
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/orr-companion.db

volumes:
  orr-data:
