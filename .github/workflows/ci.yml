name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm
      # `npm run setup` honors the repo's .npmrc (ignore-scripts=true), then
      # explicitly rebuilds the two packages that legitimately require install
      # scripts. Means a malicious transitive dep can't run lifecycle scripts
      # in CI, while better-sqlite3 and esbuild still set themselves up.
      - run: npm run setup
      - run: npm run build
      - run: npm run lint
      - run: npm test
