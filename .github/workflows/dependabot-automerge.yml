name: Dependabot auto-merge

# Removes the toil of hand-merging routine dependency bumps: auto-merges
# Dependabot patch and minor version updates once the required CI checks pass.
# Majors and security updates are deliberately left as manual PRs — majors can
# break behavior, and security PRs deserve a human glance.
#
# How the CI gate holds: `gh pr merge --auto` only completes once the branch's
# required status checks (configured in branch protection on `main`) are green,
# so a red `test` or `dependency-review` blocks the merge. Combined with the
# 30/60/90-day cooldown windows in dependabot.yml, a bump sits long enough for a
# compromised publish to surface, then merges only if the hardened CI passes.
#
# Security note: this runs on pull_request_target (base-repo context, with a
# token) but NEVER checks out or executes PR code — it only reads Dependabot's
# metadata and calls the GitHub API. There is no path for PR contents to run
# here, so the elevated context is safe.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
