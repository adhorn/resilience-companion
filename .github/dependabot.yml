# Dependabot config — conservative-by-default supply-chain posture.
#
# Cooldown windows are long enough for the ecosystem to surface compromised
# publishes and major regressions before we ingest a new version. Security
# advisories bypass cooldown entirely, so this only delays routine
# version-bump churn — never known-CVE patches.
#
# Grouping is intentionally scoped to patch and minor bumps only. Majors fall
# through to one-PR-per-package by default, so breaking changes can be
# reviewed individually rather than as a bundle.
#
# Reference: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Raised from 5 to absorb the initial backlog of separate major-bump PRs
    # that the split grouping will surface. Steady-state PR volume is much
    # lower.
    open-pull-requests-limit: 15

    cooldown:
      default-days: 30
      semver-major-days: 90
      semver-minor-days: 60
      semver-patch-days: 30

    groups:
      # Patches: batch into one PR. Semver guarantees no behavior changes,
      # review economy beats individual PRs.
      npm-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]

      # Minors: batch into one PR. Semver guarantees no breaking API changes.
      npm-minor:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor"]

      # Majors: no group — each gets its own PR so breaking changes are
      # reviewed and merged one at a time.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 30
